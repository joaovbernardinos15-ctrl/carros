<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Veltrix</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="topo">
        <div class="barra-topo">
            <a class="logo" href="index.html" aria-label="Veltrix">
                <img src="img/Velotrix.svg" alt="Veltrix">
            </a>

            <form class="pesquisa" role="search">
                <input type="search" aria-label="Pesquise" placeholder="Pesquise seu carro">
                <button type="submit">Pesquisar</button>
            </form>

            <div class="acoes-conta" aria-label="Acesso do cliente">
                <a class="botao-entrar" href="Login.html">Entrar</a>
                <a class="botao-cadastrar" href="Cadastrar.html">Cadastrar-se</a>
            </div>
        </div>

        <nav class="menu" aria-label="Menu principal">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="Sobre.html">Sobre</a></li>
                <li><a href="Contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main class="pagina-login">
        <section class="cartao-login" aria-labelledby="titulo-login">
            <img class="logo-login" src="img/Velotrix.svg" alt="Veltrix">
            <h1 id="titulo-login">Entrar na sua conta</h1>
            <p>Acesse para acompanhar seus carros favoritos e solicitações de compra.</p>

            <form class="form-login" action="index.html">
                <label for="email">E-mail</label>
                <input id="email" type="email" name="email" placeholder="seuemail@exemplo.com" required>

                <label for="senha">Senha</label>
                <input id="senha" type="password" name="senha" placeholder="Digite sua senha" required>

                <button type="submit">Entrar</button>
            </form>

            <p class="link-conta">Ainda nao tem conta? <a href="Cadastrar.html">Cadastre-se</a></p>
        </section>
    </main>

    <footer class="rodape">
        <p>© 2022 Copyright Veltrix</p>
        <div class="redes-sociais" aria-label="Redes sociais">
            <a href="https://www.instagram.com/" aria-label="Instagram">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="3" y="3" width="18" height="18" rx="5"></rect>
                    <circle cx="12" cy="12" r="4"></circle>
                    <circle cx="17" cy="7" r="1"></circle>
                </svg>
            </a>
            <a href="https://www.facebook.com/?locale=pt_BR" aria-label="Facebook">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M14 8h3V4h-3c-3 0-5 2-5 5v3H6v4h3v5h4v-5h3l1-4h-4V9c0-.6.4-1 1-1z"></path>
                </svg>
            </a>
            <a href="https://www.tiktok.com/pt-BR/" aria-label="TikTok">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M14 3v10.5A4.5 4.5 0 1 1 10 9v4a1.5 1.5 0 1 0 1.5 1.5V3h2.5c.6 2.4 2.3 4.1 5 4.5V11c-2-.1-3.8-.9-5-2z"></path>
                </svg>
            </a>
        </div>
    </footer>
    <script src="app.js"></script>
</body>

</html>
