<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veltrix - Loja de Carros</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="topo">
        <div class="barra-topo">
            <a class="logo" href="index.html" aria-label="Veltrix">
                <img src="img/Velotrix.svg" alt="Veltrix">
            </a>

            <form class="pesquisa" role="search">
                <input type="search" aria-label="Pesquise" placeholder="Pesquise seu carro">
                <button type="submit">Pesquisar</button>
            </form>
        </div>

        <nav class="menu" aria-label="Menu principal">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="Sobre.html">Sobre</a></li>
                <li><a href="Contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="banner" aria-label="Destaques da loja">
            <img src="img/AUTO.png" alt="Carro em destaque da Veltrix">
            <img src="img/AUTO (1).png" alt="Oferta de carro esportivo">
            <img src="img/AUTO (2).png" alt="Carro premium em destaque">
        </section>

        <section class="container-cards" aria-label="Carros disponíveis">
            <article class="card-carro">
                <img src="img/ferrari.webp" alt="Ferrari">
                <div class="info-carro">
                    <p>FERRARI</p>
                    <a class="botao-comprar" href="Comprar.html#ferrari">Comprar</a>
                </div>
            </article>

            <article class="card-carro">
                <img src="img/fusca preto.jpg" alt="Fusca preto">
                <div class="info-carro">
                    <p>FUSCÃO PRETO</p>
                    <a class="botao-comprar" href="Comprar.html#fusca">Comprar</a>
                </div>
            </article>

            <article class="card-carro">
                <img src="img/porsche.webp" alt="Porsche">
                <div class="info-carro">
                    <p>PORSCHE</p>
                    <a class="botao-comprar" href="Comprar.html#porsche">Comprar</a>
                </div>
            </article>

            <article class="card-carro">
                <img src="img/byd.avif" alt="BYD Seal">
                <div class="info-carro">
                    <p>BYD SEAL</p>
                    <a class="botao-comprar" href="Comprar.html#byd">Comprar</a>
                </div>
            </article>

            <article class="card-carro">
                <img src="img/chiron.jpg" alt="Bugatti Chiron">
                <div class="info-carro">
                    <p>BUGATTI CHIRON</p>
                    <a class="botao-comprar" href="Comprar.html#chiron">Comprar</a>
                </div>
            </article>

            <article class="card-carro">
                <img src="img/veneno.jpg" alt="Lamborghini Veneno">
                <div class="info-carro">
                    <p>LAMBORGHINI VENENO</p>
                    <a class="botao-comprar" href="Comprar.html#veneno">Comprar</a>
                </div>
            </article>

            <article class="card-carro">
                <img src="img/spider.webp" alt="Lamborghini Spider">
                <div class="info-carro">
                    <p>LAMBORGHINI SPIDER</p>
                    <a class="botao-comprar" href="Comprar.html#spider">Comprar</a>
                </div>
            </article>

            <article class="card-carro">
                <img src="img/Audi-RS6-Performance-25-1320x743.webp" alt="Audi RS6">
                <div class="info-carro">
                    <p>AUDI RS6</p>
                    <a class="botao-comprar" href="Comprar.html#audi">Comprar</a>
                </div>
            </article>

            <article class="card-carro">
                <img src="img/jaguar.webp" alt="Jaguar">
                <div class="info-carro">
                    <p>JAGUAR</p>
                    <a class="botao-comprar" href="Comprar.html#jaguar">Comprar</a>
                </div>
            </article>

            <article class="card-carro">
                <img src="img/range-rover-sport-2023.jpg" alt="Range Rover Sport">
                <div class="info-carro">
                    <p>RANGE ROVER SPORT</p>
                    <a class="botao-comprar" href="Comprar.html#range-rover">Comprar</a>
                </div>
            </article>
        </section>
    </main>

    <footer class="rodape">© 2022 Copyright Veltrix</footer>
</body>

</html>
